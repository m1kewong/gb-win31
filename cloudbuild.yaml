steps:
  # Step 1: Use a GBDK-enabled Docker image and run make
  - name: 'ghcr.io/gbdk-2020/gbdk-2020:latest'
    entrypoint: 'make'
    args: ['-C', '.'] # Run make in the current directory (source root)

  # Step 2: (Optional) List files to verify build output - useful for debugging
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "--- Listing files after make ---"
        ls -la
        echo "--- Listing bin directory ---"
        ls -la bin/

# Define the artifacts to store
artifacts:
  objects:
    # Replace <YOUR-GCS-BUCKET-NAME> with your actual GCS bucket name
    location: 'gs://<YOUR-GCS-BUCKET-NAME>/win31_gb_clone/'
    paths:
      # This assumes your Makefile outputs the ROM to a 'bin' directory
      # and the ROM is named 'win31.gb'
      - 'bin/win31.gb'
